<!DOCTYPE html>
<html lang="en">
<head>

  <title>Eva Mariyam - Contact Details</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:'Segoe UI',sans-serif;
      background:linear-gradient(135deg,#f3f6ff,#eef7f3);
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:15px;
    }

    .card{
      width:100%;
      max-width:380px;
      background:#ffffff;
      border-radius:28px;
      overflow:hidden;
      box-shadow:0 10px 35px rgba(0,0,0,0.12);
    }

    .top{
      background:linear-gradient(135deg,#2563eb,#1d4ed8);
      padding:25px 20px 75px;
      text-align:center;
      position:relative;
    }

    .school-name{
      color:#ffffff;
      font-size:18px;
      font-weight:700;
      line-height:1.4;
      margin-bottom:10px;
    }

    .profile{
      width:130px;
      height:130px;
      border-radius:50%;
      object-fit:cover;
      border:5px solid #fff;
      position:absolute;
      left:50%;
      transform:translateX(-50%);
      bottom:-65px;
      box-shadow:0 8px 20px rgba(0,0,0,0.2);
    }

    .content{
      padding:85px 22px 25px;
      text-align:center;
    }

    h1{
      font-size:28px;
      color:#222;
      margin-bottom:5px;
    }

    .subtitle{
      color:#666;
      font-size:15px;
      margin-bottom:22px;
      font-weight:500;
    }

    .info-box{
      background:#f7f9fc;
      border-radius:18px;
      padding:16px;
      margin-bottom:18px;
      text-align:left;
      box-shadow:0 4px 10px rgba(0,0,0,0.05);
    }

    .info{
      display:flex;
      justify-content:space-between;
      gap:10px;
      margin-bottom:14px;
      padding-bottom:12px;
      border-bottom:1px solid #e5e7eb;
      font-size:15px;
    }

    .info:last-child{
      margin-bottom:0;
      border-bottom:none;
      padding-bottom:0;
    }

    .label{
      font-weight:700;
      color:#333;
      min-width:110px;
    }

    .value{
      color:#555;
      text-align:right;
      flex:1;
      font-weight:500;
    }

    .address{
      line-height:1.6;
    }

    .buttons{
      display:flex;
      flex-direction:column;
      gap:12px;
      margin-top:20px;
    }

    .btn{
      text-decoration:none;
      padding:14px;
      border-radius:14px;
      font-weight:600;
      color:white;
      font-size:16px;
      transition:0.3s;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:8px;
    }

    .btn:hover{
      transform:translateY(-2px);
      opacity:0.95;
    }

    .whatsapp{
      background:#25D366;
    }

    .call{
      background:#2563eb;
    }

    .save{
      background:#7c3aed;
    }

    @media(max-width:400px){

      .school-name{
        font-size:16px;
      }

      h1{
        font-size:24px;
      }

      .info{
        flex-direction:column;
      }

      .value{
        text-align:left;
      }
    }

  </style>
</head>
